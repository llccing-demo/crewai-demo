# =============================================================
# Crew 1: Blog Topic Strategist Tasks
# =============================================================

analyze_blog_task:
  description: >
    使用 ScrapeWebsiteTool 抓取 Rowan 博客的 RSS 源：
    https://rowanliu.com/rss.xml

    从 RSS 内容中提取：
    1. 所有文章标题和发布日期
    2. 涉及的技术主题（如 Angular、Vue、CI/CD、HTTP、OAuth 等）
    3. 各主题的文章数量分布
    4. 最近 1 年内发布的文章（2025-2026 年）

    输出一份结构化的博客内容地图，标注已覆盖和薄弱的领域。
  expected_output: >
    一份博客内容分析报告，包含：
    - 已覆盖主题列表及各主题文章数量
    - 最近活跃主题（2025-2026 年）
    - 明显薄弱或尚未涉及的技术领域
  agent: blog_analyst

research_trends_task:
  description: >
    搜索 2026 年前端开发和 Web 技术领域最热门的话题，
    重点关注 Rowan 博客尚未深入覆盖的方向。

    搜索方向：
    1. "frontend development trends 2026"
    2. "React Server Components best practices 2026"
    3. "WebAssembly frontend 2026"
    4. "frontend testing strategies 2026 vitest playwright"
    5. "AI coding tools developer workflow 2026"

    结合博客内容分析的结果，找出 3-5 个最具潜力的选题方向。
  expected_output: >
    一份趋势研究报告，列出 3-5 个热门话题，
    每个话题说明：为什么热门、与 Rowan 现有内容的关系、潜在读者群体。
  agent: trend_researcher
  context:
    - analyze_blog_task

generate_suggestions_task:
  description: >
    综合博客内容分析和趋势研究，为 Rowan 生成 5 个新文章选题建议。

    每个选题必须满足：
    1. 与 Rowan 现有技术积累相关（前端/Angular/AI 方向）
    2. 尚未被博客深入覆盖
    3. 2026 年读者关注度高
    4. 适合中文技术博客受众

    每个选题包含：标题、一句话定位、3-5 个核心写作要点、预估读者群体。
    全部以中文输出。
  expected_output: >
    5 个结构化的博客选题建议，格式如下：

    ## 选题 1：[文章标题]
    **定位**：[一句话说明这篇文章的核心价值]
    **写作要点**：
    - 要点 1
    - 要点 2
    - 要点 3
    **目标读者**：[描述目标读者]

    （重复 5 次）
  agent: content_strategist
  output_file: suggestions.md
  context:
    - analyze_blog_task
    - research_trends_task

# =============================================================
# Crew 2: SEO & Quality Reviewer Tasks
# =============================================================

read_article_task:
  description: >
    使用 ScrapeWebsiteTool 抓取以下博客文章的完整内容：
    {article_url}

    提取：
    1. 文章完整标题
    2. 所有段落正文
    3. 标题层级结构（H1/H2/H3）
    4. 代码块数量和大致内容
    5. 页面内外部链接
    6. 文章总字数估算
  expected_output: >
    文章原始内容结构报告，包含标题层级、正文摘要、
    代码块统计和链接列表。
  agent: article_reader

seo_audit_task:
  description: >
    基于抓取到的文章内容，执行 SEO 专项审查：

    检查维度：
    1. **标题优化**：H1 标题是否包含核心关键词
    2. **关键词分布**：目标关键词在正文中出现的频率
    3. **标题层级**：H2/H3 结构是否清晰合理
    4. **文章长度**：字数是否符合技术文章 SEO 标准（建议 >1500 字）
    5. **内部链接**：是否链接到博客其他相关文章
    6. **URL 结构**：URL slug 是否简洁且含关键词

    以中文输出具体、可执行的 SEO 改进建议。
  expected_output: >
    SEO 审查报告（中文），包含：
    - 评分：各维度 1-5 分
    - 问题描述：具体指出每个问题
    - 改进建议：给出明确的修改方案
  agent: seo_specialist
  context:
    - read_article_task

quality_review_task:
  description: >
    基于抓取到的文章内容，执行内容质量审查：

    检查维度：
    1. **内容完整性**：文章是否涵盖了该主题的核心知识点
    2. **代码示例**：代码示例是否充足、准确、有注释
    3. **可读性**：段落长度、过渡句、技术术语解释是否到位
    4. **实用性**：读者看完能否直接上手使用
    5. **结构**：是否有清晰的开头、中间、结尾
    6. **缺失内容**：哪些重要内容没有提到

    综合 SEO 审查结果，输出完整的文章改进报告（中文）。
  expected_output: >
    完整的文章改进报告（中文），包含：
    - 文章亮点（写得好的地方）
    - 内容质量问题清单
    - SEO 问题清单
    - 优先级排序的改进行动项（高/中/低优先级）
    - 总体评分（1-10 分）及改进后预期效果
  agent: technical_editor
  output_file: review.md
  context:
    - read_article_task
    - seo_audit_task
